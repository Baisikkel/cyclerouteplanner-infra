sources:
  backend_logs:
    type: docker_logs
    include_containers:
      - cyclerouteplanner-backend

  nginx_access_logs:
    type: file
    include:
      - /var/log/nginx/access.log
    read_from: beginning

  nginx_error_logs:
    type: file
    include:
      - /var/log/nginx/error.log
    read_from: beginning

transforms:
  label_backend:
    type: remap
    inputs:
      - backend_logs
    source: |
      .source = .container_name

  parse_nginx_access:
    type: remap
    inputs:
      - nginx_access_logs
    source: |
      .source = .file
      parsed, err = parse_nginx_log(.message, "combined")
      if err == null {
        .client_ip = parsed.client
        .method = parsed.method
        .path = parsed.path
        .status = parsed.status
        .size = parsed.size
        .referer = parsed.referer
        .user_agent = parsed.agent
      }

  label_nginx_error:
    type: remap
    inputs:
      - nginx_error_logs
    source: |
      .source = .file

sinks:
  betterstack_backend:
    type: http
    inputs:
      - label_backend
    uri: https://s2388953.eu-fsn-3.betterstackdata.com
    encoding:
      codec: json
    request:
      headers:
        Authorization: "Bearer ${BETTERSTACK_SOURCE_TOKEN}"

  betterstack_nginx:
    type: http
    inputs:
      - parse_nginx_access
      - label_nginx_error
    uri: https://s2389256.eu-fsn-3.betterstackdata.com
    encoding:
      codec: json
    request:
      headers:
        Authorization: "Bearer ${BETTERSTACK_NGINX_SOURCE_TOKEN}"
