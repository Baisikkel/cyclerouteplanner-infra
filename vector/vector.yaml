sources:
  backend_logs:
    type: docker_logs
    include_containers:
      - cyclerouteplanner-backend

  nginx_access_logs:
    type: file
    include:
      - /var/log/nginx/access.log
    read_from: beginning

  nginx_error_logs:
    type: file
    include:
      - /var/log/nginx/error.log
    read_from: beginning

transforms:
  parse_backend:
    type: remap
    inputs:
      - backend_logs
    source: |
      .source = .container_name
      parsed, err = parse_regex(.message, r'^(?P<timestamp>\S+)\s+(?P<level>\w+)\s+\d+\s+---\s+\[.*?\]\s+\[(?P<thread>[^\]]*?)\]\s+(?P<logger>\S+)\s+:\s+(?P<msg>.*)$')
      if err == null {
        .level = parsed.level
        .logger = parsed.logger
        .thread, err = strip_whitespace(parsed.thread)
        .message = parsed.msg
      }
      del(.container_created_at)
      del(.container_id)
      del(.container_name)
      del(.image)
      del(.label)
      del(.stream)

  parse_nginx_access:
    type: remap
    inputs:
      - nginx_access_logs
    source: |
      .source = .file
      parsed, err = parse_nginx_log(.message, "combined")
      if err == null {
        .client = parsed.client
        .request = parsed.request
        .status = parsed.status
        .size = parsed.size
        .referer = parsed.referer
        .agent = parsed.agent
      }

  parse_nginx_error:
    type: remap
    inputs:
      - nginx_error_logs
    source: |
      .source = .file
      parsed, err = parse_nginx_log(.message, "error")
      if err == null {
        .client = parsed.client
        .request = parsed.request
        .severity = parsed.severity
      }

sinks:
  betterstack_backend:
    type: http
    inputs:
      - parse_backend
    uri: https://s2388953.eu-fsn-3.betterstackdata.com
    encoding:
      codec: json
    request:
      headers:
        Authorization: "Bearer ${BETTERSTACK_SOURCE_TOKEN}"

  betterstack_nginx:
    type: http
    inputs:
      - parse_nginx_access
      - parse_nginx_error
    uri: https://s2389256.eu-fsn-3.betterstackdata.com
    encoding:
      codec: json
    request:
      headers:
        Authorization: "Bearer ${BETTERSTACK_NGINX_SOURCE_TOKEN}"
