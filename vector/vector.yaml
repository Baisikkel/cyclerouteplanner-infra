sources:
  backend_logs:
    type: docker_logs
    include_containers:
      - cyclerouteplanner-backend

  nginx_access_logs:
    type: file
    include:
      - /var/log/nginx/access.log
    read_from: beginning

  nginx_error_logs:
    type: file
    include:
      - /var/log/nginx/error.log
    read_from: beginning

transforms:
  label_backend:
    type: remap
    inputs:
      - backend_logs
    source: |
      .source = .container_name

  label_nginx:
    type: remap
    inputs:
      - nginx_access_logs
      - nginx_error_logs
    source: |
      .source = .file

sinks:
  betterstack_backend:
    type: http
    inputs:
      - label_backend
    uri: https://s2388953.eu-fsn-3.betterstackdata.com
    encoding:
      codec: json
    request:
      headers:
        Authorization: "Bearer ${BETTERSTACK_SOURCE_TOKEN}"

  betterstack_nginx:
    type: http
    inputs:
      - label_nginx
    uri: https://s2389256.eu-fsn-3.betterstackdata.com
    encoding:
      codec: json
    request:
      headers:
        Authorization: "Bearer ${BETTERSTACK_NGINX_SOURCE_TOKEN}"
