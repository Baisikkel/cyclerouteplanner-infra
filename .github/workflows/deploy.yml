name: Deploy Infra

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose and vector config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,vector/vector.yaml"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Copy nginx config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "nginx/baisikkel.models.ee"
          target: "/tmp"
          strip_components: 1
          overwrite: true

      - name: Apply nginx config and restart services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            sudo cp /tmp/baisikkel.models.ee /etc/nginx/sites-available/baisikkel.models.ee
            sudo nginx -t
            sudo systemctl reload nginx
            cd "${{ secrets.DEPLOY_PATH }}"
            docker compose pull
            docker compose up -d
