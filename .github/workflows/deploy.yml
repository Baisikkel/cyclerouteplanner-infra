name: Deploy Infra

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Copy infra files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,vector/vector.yaml,brouter/Dockerfile,brouter/entrypoint.sh,brouter/profiles/*"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Copy nginx config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "nginx/baisikkel.models.ee"
          target: "/tmp"
          strip_components: 1
          overwrite: true

      - name: Apply nginx config and restart services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            sudo cp /tmp/baisikkel.models.ee /etc/nginx/sites-available/baisikkel.models.ee
            sudo nginx -t
            sudo systemctl reload nginx
            cd "${{ secrets.DEPLOY_PATH }}"
            # Only build brouter if the image doesn't exist (it's a one-time build)
            if ! docker image inspect cyclerouteplanner-brouter:latest >/dev/null 2>&1; then
              docker compose build brouter
            fi
            docker compose pull backend frontend vector
            docker compose up -d
